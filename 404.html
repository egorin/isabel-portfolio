<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect to index.html with hash for client-side routing
      window.location.replace(window.location.origin + window.location.pathname.split('/').slice(0, 2).join('/') + '/#' + window.location.pathname.split('/').slice(2).join('/'));
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
